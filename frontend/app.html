<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TeamFlow</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="app-page">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="workspace-name" id="workspace-name">TeamFlow</div>
      <button class="icon-btn" onclick="showNewWorkspaceModal()" title="New workspace">+</button>
    </div>

    <!-- Workspace list -->
    <div class="sidebar-section">
      <div class="section-label">Workspaces</div>
      <ul id="workspace-list" class="nav-list"></ul>
      <button class="sidebar-action-btn" onclick="showNewWorkspaceModal()">+ Add workspace</button>
    </div>

    <!-- Channel list -->
    <div class="sidebar-section">
      <div class="section-label">Channels</div>
      <ul id="channel-list" class="nav-list"></ul>
      <button class="sidebar-action-btn" onclick="showNewChannelModal()">+ Add channel</button>
    </div>

    <!-- Direct messages list -->
    <div class="sidebar-section">
      <div class="section-label">Direct Messages</div>
      <ul id="dm-list" class="nav-list"></ul>
      <button class="sidebar-action-btn" onclick="showNewDMModal()">+ New message</button>
    </div>

    <!-- User info at bottom -->
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="user-avatar">?</div>
        <div class="user-details">
          <div class="user-display-name" id="user-display-name">Loading...</div>
          <div class="user-status online">● Active</div>
        </div>
      </div>
      <button class="icon-btn" onclick="logout()" title="Log out">⏻</button>
    </div>
  </aside>

  <!-- ── Main Chat Area ── -->
  <main class="chat-area">
    <!-- Channel header -->
    <header class="chat-header">
      <div>
        <span class="channel-hash">#</span>
        <span id="channel-name">Select a channel</span>
      </div>
      <div id="typing-indicator" class="typing-indicator hidden"></div>
    </header>

    <!-- Message list -->
    <div class="messages-container" id="messages-container">
      <div class="empty-state" id="empty-state">
        <p>Select a workspace and channel to start chatting</p>
      </div>
    </div>

    <!-- Message input -->
    <div class="message-input-area">
      <div id="thread-reply-banner" class="reply-banner hidden">
        Replying in thread · <button onclick="clearThread()">Cancel</button>
      </div>
      <div class="input-row">
        <textarea
          id="message-input"
          placeholder="Message #channel"
          rows="1"
          onkeydown="handleInputKeydown(event)"
          oninput="autoResize(this); sendTyping()"
          disabled
        ></textarea>
        <button class="send-btn" onclick="sendMessage()" id="send-btn" disabled>➤</button>
      </div>
    </div>
  </main>

  <!-- ── Modals ── -->
  <div id="modal-overlay" class="modal-overlay hidden" onclick="closeModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <div id="modal-content"></div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/websocket.js"></script>
</body>
</html>
