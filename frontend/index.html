<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TeamFlow — Sign In</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="auth-page">

  <div class="auth-container">
    <div class="auth-logo">
      <span class="logo-icon">💬</span>
      <h1>TeamFlow</h1>
      <p>Where teams get things done</p>
    </div>

    <!-- Toggle between Login and Register -->
    <div class="auth-tabs">
      <button class="tab active" onclick="showTab('login')">Sign In</button>
      <button class="tab" onclick="showTab('register')">Create Account</button>
    </div>

    <!-- Login Form -->
    <form id="login-form" class="auth-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@company.com" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="Your password" required />
      </div>
      <div id="login-error" class="error-msg hidden"></div>
      <button type="submit" class="btn-primary">Sign In</button>
    </form>

    <!-- Register Form -->
    <form id="register-form" class="auth-form hidden" onsubmit="handleRegister(event)">
      <div class="form-group">
        <label>Display Name</label>
        <input type="text" id="reg-display" placeholder="Your full name" required />
      </div>
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="reg-username" placeholder="yourname (lowercase)" required />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="you@company.com" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="reg-password" placeholder="At least 8 characters" required />
      </div>
      <div id="reg-error" class="error-msg hidden"></div>
      <button type="submit" class="btn-primary">Create Account</button>
    </form>
  </div>

  <script src="/js/auth.js"></script>
</body>
</html>
