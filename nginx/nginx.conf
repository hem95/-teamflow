server {
    listen 80;
    server_name localhost;

    # ── Frontend (static HTML/JS/CSS) ─────────────────────────────────────
    location / {
        root /usr/share/nginx/html;
        index index.html;
        # SPA fallback: if a file isn't found, serve index.html
        # (lets the JS app handle routing)
        try_files $uri $uri/ /app.html;
    }

    # ── Backend REST API ───────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── WebSocket ──────────────────────────────────────────────────────────
    # WebSockets need special headers to upgrade from HTTP to WS protocol
    location /ws/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;    # keep connection open for 24 hours
    }
}
